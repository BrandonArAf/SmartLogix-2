server.port=8080
spring.application.name=smartlogix-bff

# URLs de los microservicios
ms.inventario.url=http://localhost:8081
ms.pedidos.url=http://localhost:8082

# Configuracion Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.inventario.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.inventario.slidingWindowSize=10
resilience4j.circuitbreaker.instances.inventario.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.inventario.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.inventario.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.inventario.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.inventario.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventario.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.pedidos.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.pedidos.slidingWindowSize=10
resilience4j.circuitbreaker.instances.pedidos.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.pedidos.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.pedidos.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.pedidos.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.pedidos.failureRateThreshold=50

# Actuator
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always

# CORS para el frontend
spring.web.cors.allowed-origins=http://localhost:3000

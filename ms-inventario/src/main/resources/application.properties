server.port=8081
spring.application.name=ms-inventario

# Conexion a MySQL via XAMPP
# Base de datos: smartlogix_inventario
spring.datasource.url=jdbc:mysql://localhost:3306/ms-inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Nombre de la app
spring.application.name=ms-inventario
